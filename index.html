<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plataforma Educativa</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #1a2744;
      --blue:       #2563b8;
      --light-blue: #dbeafe;
      --white:      #ffffff;
      --gray-bg:    #f0f4f8;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse-border {
      0%,100% { box-shadow: 0 0 0 2px var(--blue), 0 0 16px rgba(37,99,184,0.3); }
      50%     { box-shadow: 0 0 0 2px var(--navy), 0 0 28px rgba(37,99,184,0.55); }
    }

    @keyframes blink {
      0%,49% { opacity: 1; } 50%,100% { opacity: 0; }
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gray-bg);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed; top: 0; left: 0;
      width: 40%; height: 50%;
      background: var(--navy);
      clip-path: polygon(0 0, 100% 0, 0 100%);
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed; bottom: 0; right: 0;
      width: 35%; height: 45%;
      background: var(--navy);
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
      z-index: 0;
    }

    /* ── CARD ── */
    .card {
      position: relative;
      z-index: 1;
      background: var(--white);
      width: min(680px, 96vw);
      border-radius: 4px;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
      box-shadow: 0 12px 40px rgba(26,39,68,0.18);
    }

    /* Linea superior */
    .top-stripe {
      background: var(--navy);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .top-stripe h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      letter-spacing: 0.14em;
      color: var(--white);
      text-transform: uppercase;
    }

   /* .insert-coin {
      font-size: 0.6rem;
      color: var(--light-blue);
      letter-spacing: 0.12em;
      animation: blink 1s step-start infinite;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
    } */

    /* ── PORTRAITS ── */
    .portraits {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      background: var(--navy);
      border-top: 2px solid rgba(255,255,255,0.07);
      border-bottom: 2px solid rgba(255,255,255,0.07);
    }

    .portrait-card {
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #0f1c36;
      border-right: 1px solid #0a1428;
      transition: background 0.15s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .portrait-card:last-child { border-right: none; }

    /*Area de imagen*/
    .portrait-img {
      width: 100%;
      aspect-ratio: 3/4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      background: linear-gradient(160deg, #0d1830, #091224);
      position: relative;
      overflow: hidden;
      transition: filter 0.15s;
      filter: grayscale(0.4);
    }

    /* Sombra de la imagen */
    .portrait-img::after {
      content: '';
      position: absolute; inset: 0;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
      pointer-events: none;
    }

    /* Nombre del link */
    .name-plate {
      width: 100%;
      padding: 7px 6px;
      text-align: center;
      background: var(--navy);
      border-top: 1px solid #0a1428;
    }

    .name-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: clamp(0.65rem, 1.8vw, 0.85rem);
      letter-spacing: 0.14em;
      color: var(--light-blue);
      text-transform: uppercase;
      transition: color 0.15s;
    }

    /* ── HOVER ── */
    .portrait-card:hover,
    .portrait-card.active {
      background: #132040;
      animation: pulse-border 1.2s ease-in-out infinite;
      z-index: 2;
    }

    .portrait-card:hover .portrait-img,
    .portrait-card.active .portrait-img {
      filter: grayscale(0) brightness(1.1);
      background: linear-gradient(160deg, #162848, #0f1e38);
    }

    .portrait-card:hover .name-text,
    .portrait-card.active .name-text {
      color: var(--white);
    }

    .portrait-card:hover .name-plate,
    .portrait-card.active .name-plate {
      background: var(--blue);
    }

    /* Boton */
    .bottom-bar {
      background: var(--white);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .subtitle {
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--blue);
    }

    .hint {
      font-size: 0.62rem;
      color: #94a3b8;
      letter-spacing: 0.06em;
    }

    .fx-particle {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      border-radius: 50%;
      animation: fx-out 0.55s ease-out forwards;
    }

    @keyframes fx-out {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx,0), var(--dy,0)) scale(0); opacity: 0; }
    }

    @media (max-width: 460px) {
      .portraits { grid-template-columns: repeat(2, 1fr); }
      .portrait-card:nth-child(2) { border-right: none; }
    }
  </style>
</head>
<body>

<div class="card">

  <div class="top-stripe">
    <h1>Accesos Locales</h1>
  </div>

  <div class="portraits">

    <a href="#" class="portrait-card active" onclick="boom(event)">
      <div class="portrait-img">📚</div>
      <div class="name-plate"><div class="name-text">Link 1</div></div>
    </a>

    <a href="#" class="portrait-card" onclick="boom(event)">
      <div class="portrait-img">🖥️</div>
      <div class="name-plate"><div class="name-text">Link 2</div></div>
    </a>

    <a href="#" class="portrait-card" onclick="boom(event)">
      <div class="portrait-img">🏆</div>
      <div class="name-plate"><div class="name-text">Link 3</div></div>
    </a>

    <a href="#" class="portrait-card" onclick="boom(event)">
      <div class="portrait-img">🗂️</div>
      <div class="name-plate"><div class="name-text">Link 4</div></div>
    </a>

  </div>

  <div class="bottom-bar">
    <span class="subtitle">Plataforma Educativa</span>
    <span class="hint">◄ ► ITLA · ● Desarrollo</span>
  </div>

</div>

<script>
  const cards = document.querySelectorAll('.portrait-card');
  cards.forEach(card => {
    card.addEventListener('mouseenter', () => {
      cards.forEach(c => c.classList.remove('active'));
      card.classList.add('active');
    });
  });

  function boom(e) {
    e.preventDefault();
    const colors = ['#2563b8','#1a2744','#dbeafe','#ffffff','#60a5fa'];
    for (let i = 0; i < 10; i++) {
      const p = document.createElement('div');
      p.className = 'fx-particle';
      const size = 4 + Math.random() * 6;
      const angle = (Math.PI * 2 / 10) * i;
      const dist  = 30 + Math.random() * 45;
      p.style.cssText = `
        left:${e.clientX}px; top:${e.clientY}px;
        width:${size}px; height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        --dx:${Math.cos(angle)*dist}px;
        --dy:${Math.sin(angle)*dist}px;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 580);
    }
  }
</script>
</body>
</html>
