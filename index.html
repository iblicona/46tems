<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plataforma Educativa – Accesos Locales</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a2744;
      --blue: #2563b8;
      --light-blue: #dbeafe;
      --white: #ffffff;
      --gray-bg: #f0f4f8;
      --shadow: 0 8px 32px rgba(26,39,68,0.13);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gray-bg);
      font-family: 'DM Sans', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Background triangles like image 2 */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 40%;
      height: 50%;
      background: var(--navy);
      clip-path: polygon(0 0, 100% 0, 0 100%);
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: 0; right: 0;
      width: 35%;
      height: 45%;
      background: var(--navy);
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
      z-index: 0;
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 1;
      background: var(--white);
      border-radius: 24px;
      box-shadow: var(--shadow);
      width: min(900px, 96vw);
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Left panel – image */
    .card-left {
      background: var(--light-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px;
      min-height: 460px;
    }

    .img-circle-wrap {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      overflow: hidden;
      border: 6px solid var(--white);
      box-shadow: 0 4px 24px rgba(37,99,184,0.18);
      background: #c8d8f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .img-circle-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Placeholder icon when no real image */
    .img-placeholder {
      font-size: 80px;
      line-height: 1;
      user-select: none;
    }

    /* Right panel – content */
    .card-right {
      padding: 44px 40px 44px 36px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .subtitle {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--blue);
      margin-bottom: 4px;
    }

    .title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 4vw, 2.8rem);
      color: var(--navy);
      line-height: 1.05;
      margin-bottom: 28px;
      text-transform: uppercase;
    }

    /* Logo badge */
    .logo-badge {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 22px;
    }

    /* Links grid – alternating left/right like image 1 */
    .links-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-row {
      display: flex;
    }
    .link-row.right { justify-content: flex-end; }

    .link-btn {
      display: inline-block;
      width: 62%;
      padding: 14px 22px;
      border-radius: 50px;
      border: 2px solid var(--light-blue);
      background: var(--white);
      color: var(--blue);
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.92rem;
      text-align: center;
      letter-spacing: 0.04em;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(37,99,184,0.08);
    }

    .link-btn:hover {
      background: var(--blue);
      color: var(--white);
      border-color: var(--blue);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37,99,184,0.22);
    }

    .link-btn:active { transform: translateY(0); }

    @media (max-width: 620px) {
      .card { grid-template-columns: 1fr; }
      .card-left { min-height: 220px; padding: 24px; }
      .img-circle-wrap { width: 180px; height: 180px; }
      .card-right { padding: 30px 24px; }
      .link-btn { width: 80%; }
    }
  </style>
</head>
<body>

<div class="card">
  <!-- LEFT: circular image -->
  <div class="card-left">
    <div class="img-circle-wrap">
      <!-- Replace src with your own classroom image URL -->
      <img
        src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=600&q=80"
        alt="Salón de clases"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
      />
      <div class="img-placeholder" style="display:none;">🏫</div>
    </div>
  </div>

  <!-- RIGHT: title + links -->
  <div class="card-right">
    <!-- Logo / badge -->
    <div class="logo-badge">🌐</div>

    <p class="subtitle">Plataforma Educativa</p>
    <h1 class="title">Accesos<br>Locales</h1>

    <div class="links-grid">
      <!-- Alternating left / right like image 1 -->
      <div class="link-row left">
        <a href="#" class="link-btn">LINK 1</a>
      </div>
      <div class="link-row right">
        <a href="#" class="link-btn">LINK 2</a>
      </div>
      <div class="link-row left">
        <a href="#" class="link-btn">LINK 3</a>
      </div>
      <div class="link-row right">
        <a href="#" class="link-btn">LINK 4</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
